*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.dash{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:560px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.sidebar{background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);padding:16px 12px;display:flex;flex-direction:column;gap:4px}

.sat-btn:hover{background:var(--color-background-primary)}
.sat-btn.active{background:var(--color-background-primary);font-weight:500}
.sat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.metric-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 16px}
.tab{padding:10px 14px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.content{flex:1;padding:16px;overflow:hidden}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:100%}
.chart-box{display:flex;flex-direction:column;gap:8px}
.chart-label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.chart-wrap{position:relative;flex:1;min-height:180px}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:100%}
.sk-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.sk-card-title{font-size:12px;font-weight:500}
.sk-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.sk-key{color:var(--color-text-secondary)}
.sk-val{font-weight:500}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.badge-ok{background:var(--color-background-success);color:var(--color-text-success)}
.badge-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.cv-panel{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cv-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.cv-name{font-size:10px;color:var(--color-text-secondary);margin-bottom:6px}
.cv-mae{font-size:16px;font-weight:500}
.cv-rmse{font-size:11px;color:var(--color-text-tertiary)}
.pipeline-steps{display:flex;align-items:center;gap:0;margin-bottom:14px}
.step{flex:1;text-align:center;padding:8px 4px;font-size:11px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.step:first-child{border-radius:var(--border-radius-md) 0 0 var(--border-radius-md)}

.step-icon{font-size:14px;margin-bottom:2px}
.step-label{font-size:10px;color:var(--color-text-secondary)}
.arrow{color:var(--color-text-tertiary);font-size:14px;flex-shrink:0}

const SATS = Object.keys(TS);
let activeSat = SATS[0];
let activeTab = 'orbit';
let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function buildSidebar() {
  const sb = document.querySelector('.sidebar');
  sb.innerHTML = '<div class="sidebar-header">Satellites</div>';
  SATS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'sat-btn' + (s === activeSat ? ' active' : '');
    b.innerHTML = `<span class="sat-dot" style="background:${SAT_COLORS[s]}"></span>${s}`;
    b.onclick = () => { activeSat = s; buildSidebar(); renderTop(); renderContent(); };
    sb.appendChild(b);
  });
}

function renderTop() {
  const m = METRICS[activeSat];
  document.getElementById('topbar').innerHTML = `
    <div class="metric"><div class="metric-label">Incl. MAE</div><div class="metric-value" style="color:${SAT_COLORS[activeSat]}">${m.inc_MAE.toFixed(6)}°</div><div class="metric-sub">Mean absolute error</div></div>
    <div class="metric"><div class="metric-label">Incl. RMSE</div><div class="metric-value">${m.inc_RMSE.toFixed(6)}°</div><div class="metric-sub">Root mean sq. error</div></div>
    <div class="metric"><div class="metric-label">ΔV N/S budget</div><div class="metric-value">${m.dv.toFixed(2)} m/s</div><div class="metric-sub">Per manoeuvre cycle</div></div>
    <div class="metric"><div class="metric-label">Annual budget</div><div class="metric-value">${m.budget.toFixed(2)} m/s</div><div class="metric-sub">Station-keeping total</div></div>
  `;
}

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderContent();
}

function renderContent() {
  destroyCharts();
  const c = document.getElementById('content');
  if (activeTab === 'orbit') renderOrbit(c);
  else if (activeTab === 'sk') renderSK(c);
  else if (activeTab === 'cv') renderCV(c);
  else renderPipeline(c);
}

function renderOrbit(c) {
  c.innerHTML = `
    <div class="chart-row">
      <div class="chart-box">
        <div class="chart-label">Inclination drift (°) — 120-hour propagation</div>
        <div class="chart-wrap"><canvas id="incChart" role="img" aria-label="Inclination drift over 120 hours for ${activeSat}"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-label">Altitude variation (km) — orbital slot oscillation</div>
        <div class="chart-wrap"><canvas id="altChart" role="img" aria-label="Altitude variation for ${activeSat}"></canvas></div>
      </div>
    </div>`;

  const d = TS[activeSat];
  const col = SAT_COLORS[activeSat];

  setTimeout(() => {
    charts.inc = new Chart(document.getElementById('incChart'), {
      type:'line',
      data:{ labels: d.hours, datasets:[{ label:'Inclination (°)', data:d.inc, borderColor:col, borderWidth:1.5, pointRadius:0, fill:false, tension:0.3 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{maxTicksLimit:8, color:'#888'}, grid:{color:'rgba(128,128,128,.1)'} }, y:{ ticks:{color:'#888', callback:v=>v.toFixed(4)+'°'}, grid:{color:'rgba(128,128,128,.1)'} } } }
    });
    charts.alt = new Chart(document.getElementById('altChart'), {
      type:'line',
      data:{ labels: d.hours, datasets:[{ label:'Altitude (km)', data:d.alt, borderColor:col, borderWidth:1.5, pointRadius:0, fill:{target:'origin', above:col+'22'}, tension:0.3 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{maxTicksLimit:8, color:'#888'}, grid:{color:'rgba(128,128,128,.1)'} }, y:{ ticks:{color:'#888', callback:v=>v.toFixed(0)+' km'}, grid:{color:'rgba(128,128,128,.1)'} } } }
    });
  }, 50);
}

function renderSK(c) {
  const allSats = SATS.map(s => {
    const m = METRICS[s];
    return `
    <div class="sk-card">
      <div class="sk-card-title" style="color:${SAT_COLORS[s]}">${s}</div>
      <div class="sk-row"><span class="sk-key">Mean |inc|</span><span class="sk-val">${m.mean_inc.toFixed(4)}°</span></div>
      <div class="sk-row"><span class="sk-key">Max |inc|</span><span class="sk-val">${m.max_inc.toFixed(4)}°</span></div>
      <div class="sk-row"><span class="sk-key">ΔV N/S</span><span class="sk-val">${m.dv.toFixed(4)} m/s</span></div>
      <div class="sk-row"><span class="sk-key">Annual budget</span><span class="sk-val">${m.budget.toFixed(2)} m/s</span></div>
      <div class="sk-row"><span class="sk-key">N/S threshold</span><span class="sk-val"><span class="badge badge-ok">Within 0.05°</span></span></div>
    </div>`;
  }).join('');
  c.innerHTML = `<div class="sk-grid">${allSats}</div>`;
}

function renderCV(c) {
  const cards = SATS.map((s,i) => {
    const cv = CV[s];
    return `
    <div class="cv-card">
      <div class="cv-name">${s}</div>
      <div class="cv-mae" style="color:${SAT_COLORS[s]}">${cv.mae.toFixed(6)}°</div>
      <div class="cv-rmse" style="margin:2px 0 4px">±${cv.mae_std.toFixed(7)}°</div>
      <div style="font-size:10px;color:var(--color-text-tertiary)">RMSE ${cv.rmse.toFixed(6)}°</div>
    </div>`;
  }).join('');

  c.innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;font-weight:500">Walk-forward cross-validation (5 folds) — MAE ± std · RMSE per satellite</div>
      <div class="cv-panel">${cards}</div>
    </div>
    <div style="margin-top:14px;border-top:0.5px solid var(--color-border-tertiary);padding-top:12px">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;font-weight:500">MAE comparison across satellites (inclination, °)</div>
      <div style="position:relative;height:120px"><canvas id="cvChart" role="img" aria-label="Cross-validation MAE bar chart across 5 satellites"></canvas></div>
    </div>`;

  setTimeout(() => {
    charts.cv = new Chart(document.getElementById('cvChart'), {
      type:'bar',
      data:{ labels: SATS, datasets:[
        { label:'MAE', data: SATS.map(s=>CV[s].mae), backgroundColor: SATS.map(s=>SAT_COLORS[s]+'cc'), borderWidth:0 },
      ]},
      options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{color:'#888', callback:v=>v.toFixed(6)+'°'}, grid:{color:'rgba(128,128,128,.1)'} }, y:{ ticks:{color:'#888', font:{size:11}} } } }
    });
  }, 50);
}
